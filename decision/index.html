<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Decision | Vivek Juneja</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            -webkit-user-select: none;
            user-select: none;
        }

        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #eee;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header a {
            color: #0366d6;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .header a:hover {
            text-decoration: underline;
        }

        .header .title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-controls button {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #333;
        }

        .nav-controls button:hover {
            background: #e8e8e8;
        }

        .nav-controls button:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .page-info {
            font-size: 0.85rem;
            color: #666;
            min-width: 80px;
            text-align: center;
        }

        #viewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            gap: 24px;
        }

        #viewer canvas {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            max-width: 100%;
            height: auto !important;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #666;
            font-size: 1rem;
        }

        @media print {
            body {
                display: none !important;
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .header .title {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="../">&larr; Back</a>
        <span class="title">Build & Lead – When AI Executes, Leaders Decide</span>
        <div class="nav-controls">
            <button id="prev-btn" disabled>&lsaquo; Prev</button>
            <span class="page-info" id="page-info"></span>
            <button id="next-btn" disabled>Next &rsaquo;</button>
        </div>
    </div>

    <div id="viewer">
        <div class="loading" id="loading">Loading document…</div>
    </div>

    <script type="module">
        const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

        const PDF_PATH = 'handout.pdf';
        const viewer = document.getElementById('viewer');
        const loading = document.getElementById('loading');
        const pageInfo = document.getElementById('page-info');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let rendering = false;

        // Disable right-click
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Block print shortcuts
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                e.preventDefault();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
            }
        });

        async function renderPage(num) {
            if (rendering) return;
            rendering = true;

            const page = await pdfDoc.getPage(num);
            const scale = Math.min((window.innerWidth - 48) / page.getViewport({ scale: 1 }).width, 2);
            const viewport = page.getViewport({ scale });

            // Clear viewer
            viewer.innerHTML = '';

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            viewer.appendChild(canvas);

            await page.render({ canvasContext: ctx, viewport }).promise;

            currentPage = num;
            pageInfo.textContent = `${currentPage} / ${totalPages}`;
            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= totalPages;
            rendering = false;
        }

        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) renderPage(currentPage - 1);
        });

        nextBtn.addEventListener('click', () => {
            if (currentPage < totalPages) renderPage(currentPage + 1);
        });

        // Keyboard navigation
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                if (currentPage > 1) renderPage(currentPage - 1);
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                if (currentPage < totalPages) renderPage(currentPage + 1);
            }
        });

        try {
            pdfDoc = await pdfjsLib.getDocument(PDF_PATH).promise;
            totalPages = pdfDoc.numPages;
            loading.remove();
            renderPage(1);
        } catch (err) {
            loading.textContent = 'Unable to load document.';
            console.error(err);
        }
    </script>
</body>

</html>
